services:
  # PostgreSQL Database Service
  - type: postgres
    name: coding-courses-db
    plan: free
    ipAllowList: [] # Allow all connections (for development)
    databaseName: coding_courses
    postgresqlVersion: 15
    initScriptPath: ./init.sql

  # PHP Web Service
  - type: web
    name: elearning-platform
    runtime: php
    plan: free
    buildCommand: composer install
    startCommand: php -S 0.0.0.0:10000 -t .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coding-courses-db
          property: connectionString
      - key: PHP_VERSION
        value: "8.2"
